name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PHP Coding Standards ──────────────────────────────────────────────────
  phpcs:
    name: WPCS (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.2' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPCS
        run: composer run phpcs

  # ── PHPStan static analysis ───────────────────────────────────────────────
  phpstan:
    name: PHPStan level 6 (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.2' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: composer run phpstan

  # ── PHPUnit — PHP version matrix ──────────────────────────────────────────
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: ${{ matrix.php == '8.2' && 'xdebug' || 'none' }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit (Unit suite)
        run: composer run phpunit -- --testsuite=Unit

      - name: Run PHPUnit (Integration suite)
        run: composer run phpunit -- --testsuite=Integration

      - name: Upload coverage report
        if: matrix.php == '8.2'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/clover.xml
          flags: phpunit
        continue-on-error: true

  # ── Node / TypeScript ────────────────────────────────────────────────────
  js:
    name: JS lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint:types

      - name: ESLint
        run: npm run lint:js

      - name: Production build
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: build/
          retention-days: 7

  # ── E2E tests (Playwright + wp-env) ──────────────────────────────────────
  e2e:
    name: E2E (WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    needs: [ js ]
    strategy:
      fail-fast: false
      matrix:
        wp: [ 'latest', '6.7', '6.6', '6.5' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: build/

      - name: Configure wp-env WP version
        if: matrix.wp != 'latest'
        run: |
          echo '{ "core": "WordPress/WordPress#${{ matrix.wp }}" }' > .wp-env.override.json

      - name: Start wp-env
        run: npm run wp-env:start
        env:
          WP_ENV_PHP_VERSION: '8.2'

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          WP_BASE_URL: 'http://localhost:8888'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-wp${{ matrix.wp }}
          path: playwright-report/
          retention-days: 7

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop

  # ── Plugin Check (WordPress.org readiness) ────────────────────────────────
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    needs: [ js ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: build/

      - name: Start wp-env
        run: npm run wp-env:start

      - name: Run Plugin Check
        run: npx wp-env run cli wp plugin check goblocks --format=table

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop

  # ── Build ZIP ─────────────────────────────────────────────────────────────
  package:
    name: Build distribution ZIP
    runs-on: ubuntu-latest
    needs: [ phpcs, phpstan, phpunit, js ]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: build/

      - name: Install production Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Build ZIP
        run: bash bin/build-zip.sh

      - name: Upload ZIP artefact
        uses: actions/upload-artifact@v4
        with:
          name: goblocks-${{ github.sha }}.zip
          path: goblocks.zip
          retention-days: 30
